name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: messaging-app/package-lock.json

      - name: Install & build library
        working-directory: messaging-app
        run: npm ci && npm run build:lib

      - name: npm audit (informational)
        working-directory: messaging-app
        continue-on-error: true
        run: npm audit --audit-level=high
